name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build and package
        run: |
          npm run build
          npx vsce package --no-dependencies -o cursor-budi.vsix

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set +e
          output=$(npx vsce publish --pat "$VSCE_PAT" --no-dependencies 2>&1)
          status=$?
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ] && printf '%s' "$output" | grep -qiE 'already (exists|published)'; then
            echo "VS Code Marketplace already has this version — treating as success so Open VSX can still publish."
            exit 0
          fi
          exit "$status"

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set +e
          output=$(npx ovsx publish cursor-budi.vsix --pat "$OVSX_PAT" 2>&1)
          status=$?
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ] && printf '%s' "$output" | grep -qiE 'already (exists|published)'; then
            echo "Open VSX already has this version — treating as success."
            exit 0
          fi
          exit "$status"

      - name: Upload vsix to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" cursor-budi.vsix --clobber
