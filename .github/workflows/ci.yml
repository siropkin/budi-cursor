name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test (with coverage gate)
        run: npm run test:coverage

      - name: Surface coverage summary
        if: always()
        run: |
          set -e
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| File | % Stmts | % Branch | % Funcs | % Lines |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|---------|----------|---------|---------|" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const s = require('./coverage/coverage-summary.json');
              const fmt = v => (typeof v === 'number' ? v.toFixed(2) : v?.pct?.toFixed(2) ?? '–');
              const rows = Object.entries(s).map(([k, v]) => {
                const label = k === 'total' ? '**All files**' : k.replace(process.cwd() + '/', '');
                return \`| \${label} | \${fmt(v.statements)} | \${fmt(v.branches)} | \${fmt(v.functions)} | \${fmt(v.lines)} |\`;
              });
              console.log(rows.join('\n'));
            " >> "$GITHUB_STEP_SUMMARY"
          else
            echo "coverage/coverage-summary.json not found — skipping summary" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build and package
        run: |
          npm run build
          npx vsce package --no-dependencies -o cursor-budi.vsix
          test -s cursor-budi.vsix

      - name: Grep guard — no 8.0/8.1 proxy-era strings (siropkin/budi#437)
        run: |
          set -e
          if grep -RInE '(9878|Override OpenAI Base URL)' out/ README.md; then
            echo "::error::Proxy-era strings (9878 / Override OpenAI Base URL) reappeared in build artifacts or README. See siropkin/budi#437."
            exit 1
          fi
