name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build and package
        run: |
          npm run build
          npx vsce package --no-dependencies -o cursor-budi.vsix
          test -s cursor-budi.vsix

      - name: Grep guard — no 8.0/8.1 proxy-era strings (siropkin/budi#437)
        run: |
          set -e
          if grep -RInE '(9878|Override OpenAI Base URL)' out/ README.md; then
            echo "::error::Proxy-era strings (9878 / Override OpenAI Base URL) reappeared in build artifacts or README. See siropkin/budi#437."
            exit 1
          fi
